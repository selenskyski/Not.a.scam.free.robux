<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Robux Generator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #00c853;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #00a844;
        }

        #prank {
            display: none;
            font-size: 22px;
            font-weight: bold;
            color: #ff5252;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Free Robux Generator</h1>
    <p>Enter your username to receive FREE Robux instantly!</p>
    
    <input type="text" placeholder="Username" style="padding:10px; width:80%; border-radius:6px; border:none;">
    <br>
    <button onclick="revealJoke()">Generate Robux</button>

    <p id="prank">April Fool!<br>No Robux here!</p>
</div>

<script>
    function revealJoke() {
        document.getElementById("prank").style.display = "block";
    }
</script>

</body>
</html>
